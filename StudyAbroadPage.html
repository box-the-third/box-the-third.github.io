        // 1. Define your consistent rates
  const conversionRates = {
    SAR: 1 / 32.65,
    USD: 1 / 122.4375
  };

  const currencyList = ['BDT', 'SAR', 'USD'];
  let activeCurrencyIdx = 0;
  window.activeCountryId = null; // Tracks which country modal is open

  // 2. The Conversion Function for "Lac" text
  function getConvertedText(html, targetCurrency) {
    if (targetCurrency === 'BDT') return html;

    // Regex targets numbers followed by "Lac BDT" (e.g., 60-65 Lac BDT)
    return html.replace(/(\d+)(?:\s*[–-]\s*(\d+))?\s*Lac BDT/g, (match, p1, p2) => {
      const bdtToVal = (val) => parseInt(val) * 100000;
      
      const conv1 = (bdtToVal(p1) * conversionRates[targetCurrency]).toLocaleString(undefined, {maximumFractionDigits: 0});
      
      if (p2) {
        const conv2 = (bdtToVal(p2) * conversionRates[targetCurrency]).toLocaleString(undefined, {maximumFractionDigits: 0});
        return `${match} <span class="converted-val">(${targetCurrency === 'USD' ? '$' : ''}${conv1} – ${conv2}${targetCurrency === 'SAR' ? ' SAR' : ''})</span>`;
      }
      
      return `${match} <span class="converted-val">(${targetCurrency === 'USD' ? '$' : ''}${conv1}${targetCurrency === 'SAR' ? ' SAR' : ''})</span>`;
    });
  }

  // 3. The Auto-Update Loop (Matches your index.html behavior)
  function rotateStudyAbroadCurrency() {
    activeCurrencyIdx = (activeCurrencyIdx + 1) % currencyList.length;
    const target = currencyList[activeCurrencyIdx];

    // Update the Modal if it's currently open
    const modal = document.getElementById('countryModal');
    const modalBody = document.getElementById('modalBody');
    
    if (modal.style.display === 'block' && window.activeCountryId) {
      modalBody.style.opacity = '0'; // Quick fade transition
      
      setTimeout(() => {
        const rawHtml = countryDetails[window.activeCountryId].html;
        const title = countryDetails[window.activeCountryId].title;
        modalBody.innerHTML = `<h2>${title}</h2>` + getConvertedText(rawHtml, target);
        modalBody.style.opacity = '1';
      }, 300);
    }
  }

  // Update every 5 seconds to match your main page
  setInterval(rotateStudyAbroadCurrency, 8000);

  // 4. Update your existing openCountry function to register the ID
  function openCountry(id) {
    window.activeCountryId = id;

    // Show current currency immediately on open
    modalBody.innerHTML = `<h2>${data.title}</h2>` + getConvertedText(data.html, currencyList[activeCurrencyIdx]);
    modalBody.style.opacity = '1';
    
    document.getElementById('countryModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }
